<!DOCTYPE html>
<html>
<head>
    <title>DevOps Demo</title>
    <style>
        body {
            font-family: Arial;
            text-align: center;
            background-color: #f4f4f4;
        }
        h1 {
            color: #333;
        }
        button {
            padding: 10px 20px;
            background-color: blue;
            color: white;
            border: none;
            cursor: pointer;
        }
        button:hover {
            background-color: darkblue;
        }
    </style>
</head>
<body>

    <h1>Welcome to DevOps Project 🚀</h1>
    <p id="message">Click the button</p>

    <button onclick="changeText()">Click Me</button>

    <script>
        function changeText() {
            document.getElementById("message").innerHTML = "Deployed using Jenkins 🚀";
        }
    </script>

</body>
</html>
